name: Deploy Web

# Builds the production web app and deploys it to S3 + CloudFront.
#
# Required setup (one-time, in GitHub repo settings):
#   Secrets:
#     AWS_DEPLOY_ROLE_ARN  – ARN of an IAM role this repo can assume via OIDC,
#                            with s3:PutObject/DeleteObject/ListBucket on the
#                            bucket and cloudfront:CreateInvalidation on the
#                            distribution. (Preferred over long-lived keys.)
#   The role's trust policy must allow GitHub's OIDC provider and restrict
#   `sub` to this repo (e.g. repo:salmon-wallet/salmon-wallet-v3:ref:refs/heads/main).
#
# Targets (non-secret; edit here if they change):
env:
  AWS_REGION: us-east-1
  S3_BUCKET: salmon-wallet-web-main-v3
  CLOUDFRONT_DISTRIBUTION_ID: E2NZ6X31C2VZEL

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - 'packages/ui/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch: {}

# Never run two web deploys at once; cancel superseded runs.
concurrency:
  group: deploy-web
  cancel-in-progress: false

permissions:
  id-token: write   # required for AWS OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs the pnpm version pinned in package.json#packageManager.
      # Avoids `corepack enable`, whose bundled signing keys are stale on
      # Node 22.12.0 and fail pnpm signature verification in CI.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (production)
        run: pnpm --filter @salmon/web build:prod

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Vite content-hashes everything under assets/, so those files are
      # immutable and safe to cache for a year. Upload them first.
      - name: Sync hashed assets (immutable)
        run: |
          aws s3 sync apps/web/dist/assets/ "s3://${S3_BUCKET}/assets/" \
            --cache-control "public,max-age=31536000,immutable" \
            --delete

      # Everything else (index.html, fonts, images, favicon) keeps its name
      # across deploys, so it must revalidate instead of being cached forever.
      - name: Sync remaining files (revalidate)
        run: |
          aws s3 sync apps/web/dist/ "s3://${S3_BUCKET}/" \
            --exclude "assets/*" \
            --cache-control "public,max-age=0,must-revalidate" \
            --delete

      # Only the app shell needs invalidating; hashed assets never collide.
      - name: Invalidate CloudFront (app shell)
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths '/' '/index.html'
