appId: io.salmonwallet.app
---
# Recover Wallet A — fresh install path. Caller must launchApp/clearState first.
- assertVisible: "Salmon"
- assertVisible:
    text: "RECOVER ACCOUNT"
- tapOn:
    text: "RECOVER ACCOUNT"
- extendedWaitUntil:
    visible:
      id: "recover-seed-input"
    timeout: 30000
- tapOn:
    id: "recover-seed-input"
- inputText: ${SALMON_TEST_SEED_A}
# Dismiss keyboard by tapping the title.
- tapOn: "Recover Existing Account"
- extendedWaitUntil:
    visible:
      text: "NEXT"
    timeout: 10000
- tapOn:
    text: "NEXT"
- extendedWaitUntil:
    visible:
      id: "password-input"
    timeout: 30000
- tapOn:
    id: "password-input"
- inputText: ${SALMON_TEST_PASSWORD}
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "password-confirm-input"
    timeout: 10000
- tapOn:
    id: "password-confirm-input"
- inputText: ${SALMON_TEST_PASSWORD}
- hideKeyboard
- runFlow:
    when:
      visible: "Recover Account"
    commands:
      - tapOn: "Recover Account"
- runFlow:
    when:
      visible: "Choose a Password"
    commands:
      - tapOn:
          point: "50%,95%"
