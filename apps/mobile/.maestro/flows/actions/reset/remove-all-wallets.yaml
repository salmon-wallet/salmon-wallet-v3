appId: io.salmonwallet.app
---
# Remove all wallets from device.
# DESTRUCTIVE — wipes seed/account state. Run last in any orchestrator.
- runFlow: ../../../subflows/onboard-walletA.yaml
- runFlow: ../../../subflows/open-settings.yaml
# Scroll to Danger Zone
- swipe:
    direction: UP
    from:
      text: "Address Book"
- waitForAnimationToEnd:
    timeout: 1500
# UI label is "Remove All Accounts" (translation settings.wallets.remove_all_wallets);
# Alert title still uses the legacy "Remove All Wallets?" key.
- assertVisible: "Remove All Accounts"
- takeScreenshot: screenshots/actions/reset/danger-zone
- tapOn: "Remove All Accounts"
- extendedWaitUntil:
    visible: "Remove All Wallets?"
    timeout: 5000
- takeScreenshot: screenshots/actions/reset/confirm-alert
- tapOn: "Yes, remove all"
- extendedWaitUntil:
    visible: "Welcome"
    timeout: 30000
- assertVisible: "RECOVER ACCOUNT"
- takeScreenshot: screenshots/actions/reset/post-wipe-welcome
