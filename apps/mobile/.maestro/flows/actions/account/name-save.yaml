appId: io.salmonwallet.app
---
# Rename Account #1 → "Wallet A Test".
- runFlow: ../../../subflows/onboard-walletA.yaml
- runFlow: ../../../subflows/open-accounts-panel.yaml
# Tap edit pencil on Account #1 row (right side)
- tapOn:
    point: "82%,18%"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "Edit Account"
- tapOn: "Account Name"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    id: "account-name-input"
- tapOn:
    id: "account-name-input"
- eraseText: 32
- inputText: "Wallet A Test"
# First tap dismisses keyboard (autoFocus on input grabs first tap),
# second tap fires the save handler.
- tapOn:
    id: "account-name-save-btn"
- tapOn:
    id: "account-name-save-btn"
- waitForAnimationToEnd:
    timeout: 4000
- assertVisible: "Edit Account"
- takeScreenshot: screenshots/actions/account/account-name-saved
