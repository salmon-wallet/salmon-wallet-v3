appId: io.salmonwallet.app
---
# Actions suite — state-modifying flows in safe order.
# Each leaf is self-contained (onboard-walletA/B prelude + action +
# verify), so it can run stand-alone or as part of the suite. The
# orchestrator just enforces a deterministic order so the destructive
# reset runs last.
#
# Wallet A flows (use SALMON_TEST_SEED_A)
- runFlow: ../flows/actions/account/name-save.yaml
- runFlow: ../flows/actions/profile/picture-save.yaml
- runFlow: ../flows/actions/address-book/save-contact.yaml
- runFlow: ../flows/actions/reveal/backup-seed.yaml
- runFlow: ../flows/actions/reveal/private-key.yaml
- runFlow: ../flows/actions/account/add-and-remove.yaml
- runFlow: ../flows/actions/send/sol-transfer.yaml
- runFlow: ../flows/actions/swap/intra-solana.yaml
# NFT transfer onboards Wallet B (uses SALMON_TEST_SEED_B)
- runFlow: ../flows/actions/nft/transfer-salmon.yaml
# Destructive — must be last.
- runFlow: ../flows/actions/reset/remove-all-wallets.yaml
